<svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif">
  <title>Agent 软件工厂核心链路架构图（2026-07-04）</title>
  <desc>用户输入经 run.py 入口进入 workflow.py 状态机：Commander 拆解需求后并行触发 BackendExpert 与 FrontendExpert，BackendExpert 完成后触发 TestExpert，TestExpert 完成后触发 Validator，Validator 结果经条件判断决定完成打包或退回 BackendExpert 重试；run.py 同时通过 on_event 回调把进度转发给 API 层与前端网页。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666666"></path>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0a7ea4"></path>
    </marker>
  </defs>

  <rect width="1000" height="780" fill="#ffffff"></rect>

  <!-- 用户输入 -->
  <rect x="390" y="14" width="180" height="48" rx="8" fill="none" stroke="#666666"></rect>
  <text x="480" y="34" text-anchor="middle" font-size="14" fill="#1a1a1a">用户输入</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" fill="#666666">一句话需求</text>

  <line x1="480" y1="62" x2="480" y2="88" stroke="#666666" marker-end="url(#arrow)"></line>

  <!-- run.py 入口 -->
  <rect x="350" y="90" width="260" height="52" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="480" y="112" text-anchor="middle" font-size="14" font-family="monospace" fill="#1a1a1a">run.py :: run()</text>
  <text x="480" y="130" text-anchor="middle" font-size="11" fill="#666666">入口，建初始 state</text>

  <line x1="480" y1="142" x2="480" y2="168" stroke="#666666" marker-end="url(#arrow)"></line>

  <!-- workflow.py 容器 -->
  <rect x="90" y="170" width="700" height="560" rx="10" fill="none" stroke="#999999" stroke-dasharray="5,4"></rect>
  <text x="110" y="192" font-size="12" font-family="monospace" fill="#666666">workflow.py :: build_graph()</text>

  <!-- decompose -->
  <rect x="360" y="206" width="180" height="50" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="450" y="227" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a1a">decompose</text>
  <text x="450" y="243" text-anchor="middle" font-size="10.5" fill="#666666">Commander 拆解需求</text>

  <!-- 分叉到 backend / frontend -->
  <line x1="410" y1="256" x2="240" y2="290" stroke="#666666" marker-end="url(#arrow)"></line>
  <line x1="490" y1="256" x2="640" y2="290" stroke="#666666" marker-end="url(#arrow)"></line>

  <rect x="150" y="292" width="180" height="50" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="240" y="313" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a1a">backend_expert</text>
  <text x="240" y="329" text-anchor="middle" font-size="10.5" fill="#666666">生成后端代码</text>

  <rect x="550" y="292" width="180" height="50" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="640" y="313" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a1a">frontend_expert</text>
  <text x="640" y="329" text-anchor="middle" font-size="10.5" fill="#666666">生成前端代码（并行）</text>

  <!-- backend -> test -->
  <line x1="240" y1="342" x2="240" y2="378" stroke="#666666" marker-end="url(#arrow)"></line>
  <rect x="150" y="380" width="180" height="50" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="240" y="401" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a1a">test_expert</text>
  <text x="240" y="417" text-anchor="middle" font-size="10.5" fill="#666666">生成+真跑 pytest</text>

  <!-- frontend 虚线下来，仅表示并行存在，不直接连 validator -->
  <line x1="640" y1="342" x2="640" y2="470" stroke="#999999" stroke-dasharray="3,4"></line>
  <text x="700" y="410" font-size="9.5" fill="#666666" text-anchor="middle">并行完成即可</text>
  <text x="700" y="423" font-size="9.5" fill="#666666" text-anchor="middle">不单独触发校验</text>

  <!-- test -> validator -->
  <line x1="330" y1="405" x2="380" y2="480" stroke="#666666" marker-end="url(#arrow)"></line>
  <rect x="360" y="470" width="220" height="52" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <text x="470" y="491" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a1a">validator</text>
  <text x="470" y="508" text-anchor="middle" font-size="10.5" fill="#666666">C 真实验证 + LLM 核对</text>

  <line x1="470" y1="522" x2="470" y2="548" stroke="#666666" marker-end="url(#arrow)"></line>

  <!-- 判断 diamond -->
  <polygon points="470,550 550,590 470,630 390,590" fill="none" stroke="#0a7ea4"></polygon>
  <text x="470" y="586" text-anchor="middle" font-size="11.5" fill="#1a1a1a">验证</text>
  <text x="470" y="601" text-anchor="middle" font-size="11.5" fill="#1a1a1a">通过？</text>

  <!-- done -> 交付物 -->
  <line x1="550" y1="590" x2="640" y2="590" stroke="#0a7ea4" marker-end="url(#arrowAccent)"></line>
  <text x="592" y="582" text-anchor="middle" font-size="10.5" fill="#0a7ea4">done</text>
  <rect x="500" y="660" width="200" height="50" rx="8" fill="none" stroke="#1a1a1a"></rect>
  <line x1="640" y1="590" x2="640" y2="658" stroke="#0a7ea4" marker-end="url(#arrowAccent)"></line>
  <text x="600" y="686" text-anchor="middle" font-size="13" fill="#1a1a1a">打包交付物</text>
  <text x="600" y="702" text-anchor="middle" font-size="10.5" fill="#666666">zip + test_report</text>

  <!-- retry -> 回到 backend_expert -->
  <path d="M 390,590 L 140,590 L 140,317" fill="none" stroke="#0a7ea4" marker-end="url(#arrowAccent)"></path>
  <text x="185" y="582" text-anchor="middle" font-size="10.5" fill="#0a7ea4">retry（最多4次，只回后端）</text>

  <!-- API 层（黑盒） -->
  <rect x="810" y="90" width="160" height="90" rx="8" fill="none" stroke="#999999" stroke-dasharray="5,4"></rect>
  <text x="890" y="128" text-anchor="middle" font-size="13" fill="#666666">API 层</text>
  <text x="890" y="146" text-anchor="middle" font-size="10.5" fill="#666666">（先当黑盒）</text>
  <text x="890" y="162" text-anchor="middle" font-size="10.5" fill="#666666">task_manager /</text>
  <text x="890" y="176" text-anchor="middle" font-size="10.5" fill="#666666">websocket</text>

  <line x1="610" y1="105" x2="805" y2="120" stroke="#666666" stroke-dasharray="3,3" marker-end="url(#arrow)"></line>
  <text x="710" y="98" text-anchor="middle" font-size="10" fill="#666666">on_event 回调</text>

  <line x1="890" y1="182" x2="890" y2="210" stroke="#666666" stroke-dasharray="3,3" marker-end="url(#arrow)"></line>
  <rect x="810" y="212" width="160" height="46" rx="8" fill="none" stroke="#999999"></rect>
  <text x="890" y="238" text-anchor="middle" font-size="12" fill="#666666">前端网页</text>

  <!-- 图例 -->
  <line x1="110" y1="746" x2="140" y2="746" stroke="#666666"></line>
  <text x="148" y="750" font-size="11" fill="#666666">核心业务流</text>
  <line x1="260" y1="746" x2="290" y2="746" stroke="#0a7ea4"></line>
  <text x="298" y="750" font-size="11" fill="#666666">Validator 判断结果流</text>
</svg>
